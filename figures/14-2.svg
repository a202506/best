<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" font-family="FZHei-B01, SimHei, Microsoft YaHei, sans-serif">
  <!-- 图14-2 有效沟通的四个秘诀 -->
  <!-- two overlapping circles -->
  <g stroke="#8a7458" stroke-width="1.6">
    <circle cx="135" cy="205" r="80" fill="#c2a468" fill-opacity="0.42"/>
    <circle cx="185" cy="290" r="80" fill="#9c7c4c" fill-opacity="0.42"/>
  </g>
  <text x="125" y="195" font-size="22" text-anchor="middle" fill="#2f2a25">同理心</text>
  <text x="190" y="298" font-size="22" text-anchor="middle" fill="#2f2a25">积极性</text>
  <!-- dashed arrows -->
  <g stroke="#7d7160" stroke-width="2" stroke-dasharray="3 6" stroke-linecap="round" fill="none">
    <line x1="210" y1="250" x2="455" y2="70"/>
    <line x1="215" y1="258" x2="455" y2="180"/>
    <line x1="218" y1="268" x2="455" y2="290"/>
    <line x1="212" y1="280" x2="455" y2="400"/>
  </g>
  <g fill="#7d7160">
    <polygon points="472,70 454,62 456,78"/>
    <polygon points="472,180 454,173 456,189"/>
    <polygon points="472,290 454,283 456,299"/>
    <polygon points="472,400 454,392 456,408"/>
  </g>
  <!-- banners -->
  <g stroke="#7d7563" stroke-width="1.6">
    <polygon points="480,44 660,44 700,70 660,96 480,96" fill="#ddd7c7"/>
    <polygon points="480,154 660,154 700,180 660,206 480,206" fill="#ddd7c7"/>
    <polygon points="480,264 660,264 700,290 660,316 480,316" fill="#ddd7c7"/>
    <polygon points="480,374 660,374 700,400 660,426 480,426" fill="#ddd7c7"/>
  </g>
  <g font-size="22" text-anchor="middle" fill="#2f2a25">
    <text x="575" y="78">悉心倾听</text>
    <text x="575" y="188">大方积极</text>
    <text x="575" y="298">直截了当</text>
    <text x="575" y="408">不同意的艺术</text>
  </g>
</svg>
