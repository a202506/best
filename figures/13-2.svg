<svg xmlns="http://www.w3.org/2000/svg" width="640" height="580" viewBox="0 0 640 580" font-family="FZHei-B01, SimHei, Microsoft YaHei, sans-serif">
  <!-- 图13-2 人际网 -->
  <defs>
    <g id="smiley">
      <circle r="14" fill="#fbf4e3" stroke="#8a7a5f" stroke-width="1.4"/>
      <circle cx="-5" cy="-3" r="1.9" fill="#3f3a30"/>
      <circle cx="5" cy="-3" r="1.9" fill="#3f3a30"/>
      <path d="M-6,4 Q0,9 6,4" fill="none" stroke="#3f3a30" stroke-width="1.4"/>
    </g>
  </defs>
  <!-- expanding shaded bands (right halves of ellipses) -->
  <path d="M55,40 A460,250 0 0 1 55,540 Z" fill="#d7d0be"/>
  <path d="M55,40 A300,250 0 0 1 55,540 Z" fill="#e3ddcf"/>
  <path d="M55,40 A150,250 0 0 1 55,540 Z" fill="#ece7da"/>
  <!-- rays -->
  <g stroke="#8a7a5f" stroke-width="1.2">
    <line x1="55" y1="290" x2="150" y2="170"/><line x1="55" y1="290" x2="150" y2="230"/><line x1="55" y1="290" x2="150" y2="290"/><line x1="55" y1="290" x2="150" y2="350"/><line x1="55" y1="290" x2="150" y2="410"/>
    <line x1="150" y1="290" x2="300" y2="130"/><line x1="150" y1="290" x2="300" y2="190"/><line x1="150" y1="290" x2="300" y2="250"/><line x1="150" y1="290" x2="300" y2="310"/><line x1="150" y1="290" x2="300" y2="370"/><line x1="150" y1="290" x2="300" y2="430"/>
    <line x1="300" y1="250" x2="470" y2="80"/><line x1="300" y1="250" x2="470" y2="140"/><line x1="300" y1="250" x2="470" y2="200"/><line x1="300" y1="250" x2="470" y2="260"/><line x1="300" y1="250" x2="470" y2="320"/><line x1="300" y1="250" x2="470" y2="380"/><line x1="300" y1="250" x2="470" y2="440"/><line x1="300" y1="250" x2="470" y2="500"/>
  </g>
  <!-- dotted ring arcs -->
  <g fill="none" stroke="#6b6052" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round">
    <path d="M150,162 Q176,290 150,418"/>
    <path d="M300,122 Q330,250 300,438"/>
    <path d="M470,72 Q506,290 470,508"/>
  </g>
  <!-- origin -->
  <use href="#smiley" transform="translate(55,290)"/>
  <!-- ring1 -->
  <g><use href="#smiley" transform="translate(150,170)"/><use href="#smiley" transform="translate(150,230)"/><use href="#smiley" transform="translate(150,290)"/><use href="#smiley" transform="translate(150,350)"/><use href="#smiley" transform="translate(150,410)"/></g>
  <!-- ring2 -->
  <g><use href="#smiley" transform="translate(300,130)"/><use href="#smiley" transform="translate(300,190)"/><use href="#smiley" transform="translate(300,250)"/><use href="#smiley" transform="translate(300,310)"/><use href="#smiley" transform="translate(300,370)"/><use href="#smiley" transform="translate(300,430)"/></g>
  <!-- ring3 -->
  <g><use href="#smiley" transform="translate(470,80)"/><use href="#smiley" transform="translate(470,140)"/><use href="#smiley" transform="translate(470,200)"/><use href="#smiley" transform="translate(470,260)"/><use href="#smiley" transform="translate(470,320)"/><use href="#smiley" transform="translate(470,380)"/><use href="#smiley" transform="translate(470,440)"/><use href="#smiley" transform="translate(470,500)"/></g>
  <!-- labels -->
  <g font-size="20" text-anchor="middle" fill="#2f2a25">
    <text x="40" y="256">1人</text>
    <text x="150" y="148">200人</text>
    <text x="300" y="106">40000人</text>
    <text x="478" y="56">8000000人</text>
  </g>
</svg>
