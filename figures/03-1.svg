<svg xmlns="http://www.w3.org/2000/svg" width="780" height="450" viewBox="0 0 780 450" font-family="FZHei-B01, SimHei, Microsoft YaHei, sans-serif">
  <!-- 图3-1 积极主动的七个步骤 -->
  <!-- 积极主动 direction arrow (upper-left), same style as 图11-1 -->
  <line x1="60" y1="330" x2="178" y2="150" stroke="#d8b25e" stroke-width="15" stroke-linecap="round"/>
  <polygon points="194,127 191,160 163,140" fill="#d8b25e" stroke="#a8762f" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="70" y="288" font-size="27" fill="#8a4b2a" transform="rotate(-33 70 288)">积极主动</text>
  <!-- 7 ascending steps -->
  <g>
    <g><rect x="150" y="388" width="350" height="38" rx="4" fill="#efe7d6" stroke="#9c8e6f" stroke-width="1.4"/><text x="166" y="413" font-size="18" fill="#2f2a25">(1) 拥有积极的态度，乐观面对人生</text></g>
    <g><rect x="180" y="340" width="350" height="38" rx="4" fill="#e9dfc9" stroke="#9c8e6f" stroke-width="1.4"/><text x="196" y="365" font-size="18" fill="#2f2a25">(2) 远离被动的习惯，从小事做起</text></g>
    <g><rect x="210" y="292" width="350" height="38" rx="4" fill="#e4d8bd" stroke="#9c8e6f" stroke-width="1.4"/><text x="226" y="317" font-size="18" fill="#2f2a25">(3) 对自己负责，把握自己的命运</text></g>
    <g><rect x="240" y="244" width="350" height="38" rx="4" fill="#ddcfae" stroke="#9c8e6f" stroke-width="1.4"/><text x="256" y="269" font-size="18" fill="#2f2a25">(4) 积极尝试，邂逅机遇</text></g>
    <g><rect x="270" y="196" width="350" height="38" rx="4" fill="#d6c69e" stroke="#9c8e6f" stroke-width="1.4"/><text x="286" y="221" font-size="18" fill="#2f2a25">(5) 充分准备，把握机遇</text></g>
    <g><rect x="300" y="148" width="350" height="38" rx="4" fill="#cdba8c" stroke="#9c8e6f" stroke-width="1.4"/><text x="316" y="173" font-size="18" fill="#2f2a25">(6) 积极争取，创造机遇</text></g>
    <g><rect x="330" y="100" width="350" height="38" rx="4" fill="#c4ad7b" stroke="#9c8e6f" stroke-width="1.4"/><text x="346" y="125" font-size="18" fill="#2f2a25">(7) 积极地推销自己</text></g>
  </g>
</svg>
