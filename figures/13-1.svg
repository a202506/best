<svg xmlns="http://www.w3.org/2000/svg" width="660" height="560" viewBox="0 0 660 560" font-family="FZHei-B01, SimHei, Microsoft YaHei, sans-serif">
  <!-- 图13-1 与人相处、合作共赢 -->
  <!-- pediment -->
  <polygon points="330,40 590,165 70,165" fill="#e7e1d3" stroke="#8f8369" stroke-width="2" stroke-linejoin="round"/>
  <text x="330" y="100" font-size="23" text-anchor="middle" fill="#5a4632">与人相处</text>
  <text x="330" y="132" font-size="23" text-anchor="middle" fill="#5a4632">合作共赢</text>
  <!-- architrave -->
  <rect x="78" y="165" width="504" height="36" fill="#dcd5c4" stroke="#8f8369" stroke-width="2"/>
  <!-- columns -->
  <g stroke="#9a8f78" stroke-width="1.4">
    <!-- column builder: capital, shaft, base, fluting -->
    <!-- left -->
    <rect x="118" y="201" width="64" height="13" fill="#ece7da"/>
    <rect x="125" y="214" width="50" height="226" fill="#e6e0d2"/>
    <rect x="120" y="440" width="60" height="14" fill="#ece7da"/>
    <line x1="138" y1="216" x2="138" y2="438"/><line x1="150" y1="216" x2="150" y2="438"/><line x1="162" y1="216" x2="162" y2="438"/>
    <!-- mid -->
    <rect x="298" y="201" width="64" height="13" fill="#ece7da"/>
    <rect x="305" y="214" width="50" height="226" fill="#e6e0d2"/>
    <rect x="300" y="440" width="60" height="14" fill="#ece7da"/>
    <line x1="318" y1="216" x2="318" y2="438"/><line x1="330" y1="216" x2="330" y2="438"/><line x1="342" y1="216" x2="342" y2="438"/>
    <!-- right -->
    <rect x="478" y="201" width="64" height="13" fill="#ece7da"/>
    <rect x="485" y="214" width="50" height="226" fill="#e6e0d2"/>
    <rect x="480" y="440" width="60" height="14" fill="#ece7da"/>
    <line x1="498" y1="216" x2="498" y2="438"/><line x1="510" y1="216" x2="510" y2="438"/><line x1="522" y1="216" x2="522" y2="438"/>
  </g>
  <!-- column labels (vertical) -->
  <g font-size="21" text-anchor="middle" fill="#3f3a30">
    <text x="150" y="268">人</text><text x="150" y="308">际</text><text x="150" y="348">交</text><text x="150" y="388">流</text>
    <text x="330" y="308">沟</text><text x="330" y="348">通</text>
    <text x="510" y="268">团</text><text x="510" y="308">队</text><text x="510" y="348">合</text><text x="510" y="388">作</text>
  </g>
  <!-- base steps -->
  <rect x="62" y="454" width="536" height="40" fill="#ddd6c4" stroke="#8f8369" stroke-width="2"/>
  <text x="110" y="481" font-size="21" text-anchor="middle" fill="#3f3a30">信任</text>
  <rect x="34" y="494" width="592" height="42" fill="#d4cdba" stroke="#8f8369" stroke-width="2"/>
  <text x="92" y="522" font-size="21" text-anchor="middle" fill="#3f3a30">同理心</text>
</svg>
