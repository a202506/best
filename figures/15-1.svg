      <ellipse cx="398" cy="280" rx="30" ry="18"/>
      <ellipse cx="230.7" cy="210.7" rx="30" ry="18"/>
      <ellipse cx="369.3" cy="210.7" rx="30" ry="18"/>
      <ellipse cx="230.7" cy="349.3" rx="30" ry="18"/>
