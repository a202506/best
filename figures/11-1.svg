<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" font-family="FZHei-B01, SimHei, Microsoft YaHei, sans-serif">
  <!-- 图11-1 执行力的八个阶梯 -->
  <!-- 执行力 direction arrow (upper-left) -->
  <line x1="64" y1="318" x2="176" y2="156" stroke="#d8b25e" stroke-width="15" stroke-linecap="round"/>
  <polygon points="192,133 190,166 162,146" fill="#d8b25e" stroke="#a8762f" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="78" y="270" font-size="27" fill="#8a4b2a" transform="rotate(-30 78 270)">执行力</text>
  <!-- 成功 starburst (top-right) -->
  <polygon points="708,120 685.1,105.5 691,79 664.5,84.9 650,62 635.5,84.9 609,79 614.9,105.5 592,120 614.9,134.5 609,161 635.5,155.1 650,178 664.5,155.1 691,161 685.1,134.5"
           fill="#ecca60" stroke="#c08a32" stroke-width="1.6" stroke-linejoin="round"/>
  <text x="650" y="129" font-size="23" text-anchor="middle" fill="#8a4b2a" font-weight="bold">成功</text>
  <!-- 8 ascending steps -->
  <g>
    <g><rect x="120" y="388" width="225" height="36" rx="4" fill="#efe7d6" stroke="#9c8e6f" stroke-width="1.4"/><text x="134" y="412" font-size="18" fill="#2f2a25">(1) 周密的计划</text></g>
    <g><rect x="150" y="348" width="225" height="36" rx="4" fill="#e9dfc9" stroke="#9c8e6f" stroke-width="1.4"/><text x="164" y="372" font-size="18" fill="#2f2a25">(2) 明确的目标</text></g>
    <g><rect x="180" y="308" width="225" height="36" rx="4" fill="#e4d8bd" stroke="#9c8e6f" stroke-width="1.4"/><text x="194" y="332" font-size="18" fill="#2f2a25">(3) 差距分析</text></g>
    <g><rect x="210" y="268" width="225" height="36" rx="4" fill="#ddcfae" stroke="#9c8e6f" stroke-width="1.4"/><text x="224" y="292" font-size="18" fill="#2f2a25">(4) 循环修正</text></g>
    <g><rect x="240" y="228" width="225" height="36" rx="4" fill="#d6c69e" stroke="#9c8e6f" stroke-width="1.4"/><text x="254" y="252" font-size="18" fill="#2f2a25">(5) 坚强的毅力</text></g>
    <g><rect x="270" y="188" width="225" height="36" rx="4" fill="#cdba8c" stroke="#9c8e6f" stroke-width="1.4"/><text x="284" y="212" font-size="18" fill="#2f2a25">(6) 良好的习惯</text></g>
    <g><rect x="300" y="148" width="225" height="36" rx="4" fill="#c4ad7b" stroke="#9c8e6f" stroke-width="1.4"/><text x="314" y="172" font-size="18" fill="#2f2a25">(7) 管理时间</text></g>
    <g><rect x="330" y="108" width="225" height="36" rx="4" fill="#bba169" stroke="#9c8e6f" stroke-width="1.4"/><text x="344" y="132" font-size="18" fill="#2f2a25">(8) 多管齐下</text></g>
  </g>
</svg>
