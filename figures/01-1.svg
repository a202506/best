  <use href="#s11star" transform="translate(178,268)"/>
  <text x="197" y="275" font-size="19" fill="#2f2a25">特蕾莎修女</text>

  <use href="#s11star" transform="translate(112,372)"/>
  <text x="131" y="379" font-size="19" fill="#2f2a25">梵高</text>

  <use href="#s11star" transform="translate(132,404)"/>
  <text x="151" y="411" font-size="19" fill="#2f2a25">卡夫卡</text>

  <use href="#s11star" transform="translate(196,436)"/>
